apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ansible-tasks
  namespace: argo-workflows
spec:
  templates:
    - name: run-k3s-setup
      inputs:
        parameters:
          - name: cluster-name
      outputs:
        parameters:
          - name: master-node-ip
            valueFrom:
              path: /tmp/master-node-ip.txt
      script:
        image: alpine:3.18
        command: [sh]
        env:
          - name: GIT_TOKEN_P1
            value: "ghp_"
          - name: GIT_TOKEN_P2
            value: "r4UyKZAyUmA7Nu7zGVFSSTMwxqKhvL2S4c6W"
          - name: ANSIBLE_HOST_KEY_CHECKING
            value: "False"
        source: |
          set -e
          apk add --no-cache git ansible openssh-client py3-pip py3-requests jq
          pip3 install proxmoxer --break-system-packages || pip3 install proxmoxer
          ansible-galaxy collection install community.proxmox
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_ed25519_proxmox-vm
          -----BEGIN OPENSSH PRIVATE KEY-----
          b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
          QyNTUxOQAAACD5YK+hwQw+eyIBAEdg/nTJ4/Lv9iLdbqPTpKoH2lUIpwAAAJAa/POCGvzz
          ggAAAAtzc2gtZWQyNTUxOQAAACD5YK+hwQw+eyIBAEdg/nTJ4/Lv9iLdbqPTpKoH2lUIpw
          AAAEDIuAdzJk3z34U/O5FvZ4zh2JdiBcj2elF6RNyI0uFG6flgr6HBDD57IgEAR2D+dMnj
          8u/2It1uo9OkqgfaVQinAAAACnByb3htb3gtdm0BAgM=
          -----END OPENSSH PRIVATE KEY-----
          EOF
          chmod 600 ~/.ssh/id_ed25519_proxmox-vm
          git clone https://${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/anomaly51/ansible-infra.git /workspace/ansible-repo
          cd /workspace/ansible-repo
          sleep 45
          ansible-playbook -i inventory/proxmox.yml playbooks/setup-k3s-cluster.yaml \
            -e "target_master=~.*{{inputs.parameters.cluster-name}}-master.*" \
            -e "target_workers=~.*{{inputs.parameters.cluster-name}}-worker.*"
          MASTER_IP=$(ansible-inventory -i inventory/proxmox.yml --host {{inputs.parameters.cluster-name}}-master-01 | jq -r .ansible_host)
          echo -n "$MASTER_IP" > /tmp/master-node-ip.txt
        volumeMounts:
          - name: workspace
            mountPath: /workspace

