apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: tf-tasks
  namespace: argo-workflows
spec:
  templates:
    - name: generate-tf-cluster
      inputs:
        parameters:
          - name: cluster-name
          - name: target-nodes
          - name: template-name
          - name: master-count
          - name: worker-count
          - name: cores
          - name: memory
          - name: disk-size
      script:
        image: alpine:3.18
        command: [sh]
        source: |
          set -e
          mkdir -p /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}}
          cat << 'EOF' > /workspace/tf-repo/envs/shared/{{inputs.parameters.cluster-name}}/main.tf
          terraform {
            required_providers {
              proxmox = {
                source  = "telmate/proxmox"
                version = "3.0.2-rc07"
              }
            }
          }
          provider "proxmox" {
            pm_api_url          = "https://192.168.1.35:8006/api2/json"
            pm_api_token_id     = "terraform@pam!terraform"
            pm_api_token_secret = "bdcbd933-8cbf-4c6c-be85-41b0b8f74ba3"
            pm_tls_insecure      = true
            pm_parallel         = 4
          }
          module "k3s_cluster" {
            source        = "../../../modules/k3s-cluster"
            cluster_name  = "{{inputs.parameters.cluster-name}}"
            proxmox_nodes = {{inputs.parameters.target-nodes}}
            template_name = "{{inputs.parameters.template-name}}"
            master_count  = {{inputs.parameters.master-count}}
            worker_count  = {{inputs.parameters.worker-count}}
            cores         = {{inputs.parameters.cores}}
            memory        = {{inputs.parameters.memory}}
            disk_size     = {{inputs.parameters.disk-size}}
          }
          EOF
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: generate-tf-vm
      inputs:
        parameters:
          - name: vm-name
          - name: target-node
          - name: template-name
          - name: cores
          - name: memory
          - name: disk-size
      script:
        image: alpine:3.18
        command: [sh]
        source: |
          set -e
          mkdir -p /workspace/repo/envs/shared/{{inputs.parameters.vm-name}}
          cat << 'EOF' > /workspace/repo/envs/shared/{{inputs.parameters.vm-name}}/main.tf
          terraform {
            required_providers {
              proxmox = {
                source  = "telmate/proxmox"
                version = "3.0.2-rc07"
              }
            }
          }
          provider "proxmox" {
            pm_api_url          = "https://192.168.1.35:8006/api2/json"
            pm_api_token_id     = "terraform@pam!terraform"
            pm_api_token_secret = "bdcbd933-8cbf-4c6c-be85-41b0b8f74ba3"
            pm_tls_insecure      = true
          }
          module "vm" {
            source          = "../../../modules/vm"
            name            = "{{inputs.parameters.vm-name}}"
            description     = "Provisioned via Argo Workflow"
            template_name   = "{{inputs.parameters.template-name}}"
            target_node     = "{{inputs.parameters.target-node}}"
            cores           = {{inputs.parameters.cores}}
            memory          = {{inputs.parameters.memory}}
            scsi0_disk_size = {{inputs.parameters.disk-size}}
          }
          EOF
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: apply-tf
      inputs:
        parameters:
          - name: tf-dir
      script:
        image: hashicorp/terraform:1.5.7
        command: [sh]
        env:
          - name: GIT_TOKEN_P1
            value: "ghp_"
          - name: GIT_TOKEN_P2
            value: "r4UyKZAyUmA7Nu7zGVFSSTMwxqKhvL2S4c6W"
        source: |
          set -e
          git config --global url."https://${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/".insteadOf "https://github.com/"
          cd {{inputs.parameters.tf-dir}}
          terraform init
          terraform apply -auto-approve
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: destroy-tf
      inputs:
        parameters:
          - name: tf-dir
      script:
        image: hashicorp/terraform:1.5.7
        command: [sh]
        env:
          - name: GIT_TOKEN_P1
            value: "ghp_"
          - name: GIT_TOKEN_P2
            value: "r4UyKZAyUmA7Nu7zGVFSSTMwxqKhvL2S4c6W"
        source: |
          set -e
          if [ -d "{{inputs.parameters.tf-dir}}" ]; then
            git config --global url."https://${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/".insteadOf "https://github.com/"
            cd {{inputs.parameters.tf-dir}}
            terraform init
            terraform destroy -auto-approve
          fi
        volumeMounts:
          - name: workspace
            mountPath: /workspace
