apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argo-workflows

resources:
  - base/namespace.yaml
  - https://github.com/argoproj/argo-workflows/releases/download/v3.5.5/install.yaml
  - templates/
  - workflows/

patches:
  - path: base/argo-server-patch.yaml
    target:
      kind: Deployment
      name: argo-server
