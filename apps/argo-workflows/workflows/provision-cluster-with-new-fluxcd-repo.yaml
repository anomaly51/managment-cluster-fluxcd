apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: provision-cluster-with-new-fluxcd-repo
  namespace: argo-workflows
spec:
  entrypoint: main
  onExit: cleanup
  arguments:
    parameters:
      - name: cluster-name
        value: "new-k3s"
      - name: target-nodes
        value: '["machine-1", "machine-2"]'
      - name: master-count
        value: "1"
      - name: worker-count
        value: "2"
      - name: cores
        value: "4"
      - name: memory
        value: "4096"
      - name: disk-size
        value: "20"
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
  templates:
    - name: main
      dag:
        tasks:
          - name: clone-tf
            templateRef: { name: git-tasks, template: clone-repo }
            arguments:
              parameters:
                - name: repo-url
                  value: "github.com/anomaly51/proxmox-vms-terraform.git"
                - name: dest-path
                  value: "/workspace/tf-repo"
          - name: generate-tf
            dependencies: [clone-tf]
            templateRef: { name: tf-tasks, template: generate-tf-cluster }
            arguments:
              parameters:
                - name: cluster-name
                  value: "{{workflow.parameters.cluster-name}}"
                - name: target-nodes
                  value: "{{workflow.parameters.target-nodes}}"
                - name: master-count
                  value: "{{workflow.parameters.master-count}}"
                - name: worker-count
                  value: "{{workflow.parameters.worker-count}}"
                - name: cores
                  value: "{{workflow.parameters.cores}}"
                - name: memory
                  value: "{{workflow.parameters.memory}}"
                - name: disk-size
                  value: "{{workflow.parameters.disk-size}}"
          - name: apply-tf
            dependencies: [generate-tf]
            templateRef: { name: tf-tasks, template: apply-tf }
            arguments:
              parameters:
                - name: tf-dir
                  value: "/workspace/tf-repo/envs/shared/{{workflow.parameters.cluster-name}}"
          - name: run-ansible
            dependencies: [apply-tf]
            templateRef: { name: ansible-tasks, template: run-k3s-setup }
            arguments:
              parameters:
                - name: cluster-name
                  value: "{{workflow.parameters.cluster-name}}"
          - name: create-gitops-repo
            dependencies: [run-ansible]
            templateRef: { name: git-tasks, template: create-gitops-repo }
            arguments:
              parameters:
                - name: cluster-name
                  value: "{{workflow.parameters.cluster-name}}"
          - name: bootstrap-fluxcd
            dependencies: [run-ansible, create-gitops-repo]
            templateRef: { name: flux-tasks, template: bootstrap }
            arguments:
              parameters:
                - name: cluster-name
                  value: "{{workflow.parameters.cluster-name}}"
                - name: repo-name
                  value: "{{tasks.create-gitops-repo.outputs.parameters.repo-name}}"
                - name: master-node-ip
                  value: "{{tasks.run-ansible.outputs.parameters.master-node-ip}}"
          - name: commit-tf-state
            dependencies: [bootstrap-fluxcd]
            templateRef: { name: git-tasks, template: commit-changes }
            arguments:
              parameters:
                - name: repo-path
                  value: "/workspace/tf-repo"
                - name: add-path
                  value: "envs/shared/{{workflow.parameters.cluster-name}}/"
                - name: commit-message
                  value: "feat: terraform apply K3s cluster {{workflow.parameters.cluster-name}}"
    - name: cleanup
      steps:
        - - name: execute-cleanup
            templateRef:
              name: cleanup-tasks
              template: cleanup-on-failure
            when: "{{workflow.status}} == 'Failed'"
            arguments:
              parameters:
                - name: cluster-name
                  value: "{{workflow.parameters.cluster-name}}"
                - name: repo-name
                  value: "{{workflow.parameters.cluster-name}}-gitops"

