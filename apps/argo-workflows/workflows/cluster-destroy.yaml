apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cluster-destroy-pipeline
  namespace: argo-workflows
spec:
  entrypoint: main
  arguments:
    parameters:
      - name: tf-repo-url
        value: "github.com/anomaly51/proxmox-vms-terraform.git"
      - name: cluster-name
        value: "new-k3s"
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
  templates:
    - name: main
      steps:
        - - name: clone
            templateRef: { name: git-tasks, template: clone-repo }
            arguments:
              parameters:
                [
                  {
                    name: repo-url,
                    value: "{{workflow.parameters.tf-repo-url}}",
                  },
                  { name: dest-path, value: "/workspace/repo" },
                ]
        - - name: destroy
            templateRef: { name: tf-tasks, template: destroy-tf }
            arguments:
              parameters:
                [
                  {
                    name: tf-dir,
                    value: "/workspace/repo/envs/shared/{{workflow.parameters.cluster-name}}",
                  },
                ]
        - - name: commit
            templateRef: { name: git-tasks, template: commit-changes }
            arguments:
              parameters:
                - name: repo-path
                  value: "/workspace/repo"
                - name: add-path
                  value: "envs/shared/{{workflow.parameters.cluster-name}}/"
                - name: commit-message
                  value: "feat: terraform destroy K3s cluster {{workflow.parameters.cluster-name}}"

