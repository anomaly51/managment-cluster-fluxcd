apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fluxcd-bootstrap
  namespace: default
spec:
  params:
    - name: cluster-name
      type: string
    - name: github-owner
      type: string
    - name: repo-name
      type: string
    - name: master-node-ip
      type: string
  steps:
    - name: fetch-kubeconfig
      image: alpine:3.18
      script: |
        set -e
        apk add --no-cache curl openssh-client
        curl -sLS https://get.k3sup.dev | sh
        mkdir -p ~/.ssh
        cat << 'EOF' > ~/.ssh/id_ed25519
        -----BEGIN OPENSSH PRIVATE KEY-----
        b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
        QyNTUxOQAAACD5YK+hwQw+eyIBAEdg/nTJ4/Lv9iLdbqPTpKoH2lUIpwAAAJAa/POCGvzz
        ggAAAAtzc2gtZWQyNTUxOQAAACD5YK+hwQw+eyIBAEdg/nTJ4/Lv9iLdbqPTpKoH2lUIpw
        AAAEDIuAdzJk3z34U/O5FvZ4zh2JdiBcj2elF6RNyI0uFG6flgr6HBDD57IgEAR2D+dMnj
        8u/2It1uo9OkqgfaVQinAAAACnByb3htb3gtdm0BAgM=
        -----END OPENSSH PRIVATE KEY-----
        EOF
        chmod 600 ~/.ssh/id_ed25519
        k3sup install --skip-install --host $(params.master-node-ip) --user root --ssh-key ~/.ssh/id_ed25519 --local-path /workspace/kubeconfig --context $(params.cluster-name)
    - name: bootstrap
      image: dtzar/helm-kubectl:3.12
      env:
        - name: GIT_TOKEN_P1
          value: "ghp_"
        - name: GIT_TOKEN_P2
          value: "r4UyKZAyUmA7Nu7zGVFSSTMwxqKhvL2S4c6W"
      script: |
        set -e
        export KUBECONFIG=/workspace/kubeconfig
        export GITHUB_TOKEN="${GIT_TOKEN_P1}${GIT_TOKEN_P2}"
        curl -s https://fluxcd.io/install.sh | bash
        flux bootstrap github \
          --owner=$(params.github-owner) \
          --repository=$(params.repo-name) \
          --branch=main \
          --path=./cluster \
          --personal=true
