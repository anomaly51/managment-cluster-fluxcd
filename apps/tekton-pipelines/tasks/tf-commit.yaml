apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tf-commit
  namespace: default
spec:
  params:
    - name: run-id
      type: string
    - name: cluster-name
      type: string
  volumes:
    - name: shared-data
      persistentVolumeClaim:
        claimName: tekton-shared-pvc
  stepTemplate:
    volumeMounts:
      - name: shared-data
        mountPath: /workspace/shared-data
        subPath: $(params.run-id)
  steps:
    - name: commit-and-push
      image: alpine/git:v2.43.0
      env:
        - name: GIT_TOKEN_P1
          value: "ghp_"
        - name: GIT_TOKEN_P2
          value: "r4UyKZAyUmA7Nu7zGVFSSTMwxqKhvL2S4c6W"
      script: |
        set -e
        cd /workspace/shared-data/tf-repo
        git config --global user.name "Tekton Pipeline"
        git config --global user.email "tekton@devops.local"
        git add envs/shared/$(params.cluster-name)/
        git commit -m "feat: terraform apply and ansible init K3s cluster $(params.cluster-name)"
        git push origin main
