apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: vm-provision-pipeline
  namespace: default
spec:
  workspaces:
    - name: workspace
  params:
    - name: repo-url
      type: string
      default: "github.com/anomaly51/proxmox-vms-terraform.git"
    - name: vm-name
      type: string
      default: "new-gitops-vm"
    - name: target-node
      type: string
      default: "machine-1"
    - name: cores
      type: string
      default: "4"
    - name: memory
      type: string
      default: "4096"
    - name: disk-size
      type: string
      default: "20"
    - name: template-name
      type: string
      default: "debian-base"
  tasks:
    - name: provision-vm
      workspaces:
        - name: workspace
          workspace: workspace
      taskSpec:
        workspaces:
          - name: workspace
        steps:
          - name: clone
            image: alpine/git:v2.43.0
            env:
              - name: GIT_TOKEN_P1
                value: "ghp_"
              - name: GIT_TOKEN_P2
                value: "95do3C5ZrLwwvkIhLkyf4UERp8PFhW1yfyoM"
            script: |
              set -e
              git clone https://${GIT_TOKEN_P1}${GIT_TOKEN_P2}@$(params.repo-url) $(workspaces.workspace.path)/repo
          - name: generate
            image: alpine:3.18
            script: |
              set -e
              mkdir -p $(workspaces.workspace.path)/repo/envs/shared/$(params.vm-name)
              cat << 'EOF' > $(workspaces.workspace.path)/repo/envs/shared/$(params.vm-name)/main.tf
              terraform {
                required_providers {
                  proxmox = {
                    source  = "telmate/proxmox"
                    version = "3.0.2-rc07"
                  }
                }
              }
              provider "proxmox" {
                pm_api_url          = "https://192.168.1.35:8006/api2/json"
                pm_api_token_id     = "terraform@pam!terraform"
                pm_api_token_secret = "bdcbd933-8cbf-4c6c-be85-41b0b8f74ba3"
                pm_tls_insecure     = true
              }
              module "vm" {
                source          = "../../../modules/vm"
                name            = "$(params.vm-name)"
                description     = "Provisioned via Tekton Pipeline (Terraform Apply)"
                template_name   = "$(params.template-name)"
                target_node     = "$(params.target-node)"
                cores           = $(params.cores)
                memory          = $(params.memory)
                scsi0_disk_size = $(params.disk-size)
              }
              EOF
          - name: apply
            image: hashicorp/terraform:1.5.7
            env:
              - name: GIT_TOKEN_P1
                value: "ghp_"
              - name: GIT_TOKEN_P2
                value: "95do3C5ZrLwwvkIhLkyf4UERp8PFhW1yfyoM"
            script: |
              set -e
              git config --global url."https://${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/".insteadOf "https://github.com/"
              cd $(workspaces.workspace.path)/repo/envs/shared/$(params.vm-name)
              terraform init
              terraform apply -auto-approve
          - name: commit
            image: alpine/git:v2.43.0
            env:
              - name: GIT_TOKEN_P1
                value: "ghp_"
              - name: GIT_TOKEN_P2
                value: "95do3C5ZrLwwvkIhLkyf4UERp8PFhW1yfyoM"
            script: |
              set -e
              cd $(workspaces.workspace.path)/repo
              git config --global user.name "Tekton Pipeline"
              git config --global user.email "tekton@devops.local"
              git add envs/shared/$(params.vm-name)/
              git commit -m "feat: terraform apply VM $(params.vm-name)"
              git push origin main

